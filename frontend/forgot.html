<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles/global.css">
    <link rel="stylesheet" href="styles/forgot.css">
    <title>forgot password</title>
</head>
<body>
    <div class="main">
        <form class="content">
            <div class="container">
                <div class="title-content">
                    <img src="img/cloudlock.png" alt="reset password">
                    <h1 class="title">Reset your password</h1>
                </div>
                <p class="enter-text">Enter the email address you used to register with</p>
                <div class="email-box">
                    <label class="email-text" for="email">Email:</label>
                    <input class="input-email" type="text" id="email" name="email" placeholder="example@gmail.com">
                </div>
                <input class="submit-button" type="submit" value="Reset Password">
                <a class="problem" href="#">Forgot email address or having problem reseting password?</a>
            </div>
        </form>
    </div>
</body>
</html>
